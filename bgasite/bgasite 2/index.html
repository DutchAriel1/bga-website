    <h1>The Black Girl Advocate</h1>
    <p><strong>Empowering Black girls and young women in Colorado through education, cultural awareness, and advocacy.</strong></p>
    <p>The Black Girl Advocate (BGA) is a Colorado 501(c)(3) nonprofit (EIN 99-0725880) serving Black girls in grades 6–12. Our womanist framework moves every girl through four movements of her becoming: <strong>Seed, Shape, Sharpen, and Soar</strong>.</p>
    <h2>Our Programs</h2>
    <ul>
      <li><strong>The Elite Eight</strong> — an Ivy League college tour for Black girls in grades 9–11.</li>
      <li><strong>I Got Next: Girls in Sports</strong> — athletic advocacy and exposure, free to families.</li>
      <li><strong>Black Girls at the Arts</strong> — theatre, galleries, dance, and museum experiences.</li>
      <li><strong>Black Women in Education</strong> — a resource hub and educator advocacy training.</li>
      <li><strong>The Black Girl Hair Project</strong> — hair care, cultural affirmation, and book donations.</li>
      <li><strong>HBCU Tour & Senior Suite</strong> — college pathways, essays, and FAFSA support.</li>
    </ul>
    <h2>Get Involved</h2>
    <p>Donate, partner, volunteer, or enroll a student. Contact us at
      <a href="mailto:president@theblackgirladvocate.org">president@theblackgirladvocate.org</a> or (720) 585-1015.</p>
    <p>This website requires JavaScript for the full experience. Please enable JavaScript or contact us directly.</p>
  </div>
